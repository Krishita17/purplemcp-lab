<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640"
     font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4ef"/>
      <stop offset="0.5" stop-color="#fbeef3"/>
      <stop offset="1" stop-color="#eaf6f0"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cdb4f0"/>
      <stop offset="1" stop-color="#a37fda"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- soft pastel blobs -->
  <circle cx="1120" cy="120" r="190" fill="#ffb59e" fill-opacity="0.18"/>
  <circle cx="170" cy="560" r="170" fill="#9fe0c0" fill-opacity="0.20"/>
  <circle cx="980" cy="540" r="120" fill="#a9d6f5" fill-opacity="0.18"/>

  <!-- brand -->
  <g transform="translate(82,92)">
    <rect width="64" height="64" rx="18" fill="url(#logo)"/>
    <path d="M22 20 h20 a10 10 0 0 1 0 20 h-20 z M22 20 v40" fill="none" stroke="#ffffff"
          stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="84" y="34" font-size="40" font-weight="800" fill="#4f4860" letter-spacing="-0.5">PurpleMCP-Lab</text>
    <text x="86" y="62" font-size="18" font-weight="700" fill="#a37fda" letter-spacing="3">SORBET · PURPLE TEAM</text>
  </g>

  <!-- headline -->
  <g transform="translate(82,210)">
    <text font-size="58" font-weight="800" fill="#4f4860" letter-spacing="-0.5">
      <tspan fill="#a37fda">Build it.</tspan>
      <tspan dx="14" fill="#e76a82">Attack it.</tspan>
      <tspan dx="14" fill="#3fb38d">Defend it.</tspan>
    </text>
    <text y="44" font-size="20" fill="#867e96">A purple-team lab for the Model Context Protocol — connect any LLM to MCP servers,</text>
    <text y="72" font-size="20" fill="#867e96">break them with real exploits, then harden them with a reusable guardrails library.</text>
  </g>

  <!-- pillar cards -->
  <g transform="translate(80,344)">
    <!-- BUILD -->
    <g transform="translate(0,0)">
      <rect width="357" height="170" rx="16" fill="#ffffff" stroke="#cdb4f0" stroke-opacity="0.9"/>
      <circle cx="32" cy="38" r="8" fill="#a37fda"/>
      <text x="52" y="45" font-size="22" font-weight="800" fill="#a37fda">BUILD</text>
      <text x="28" y="90"  font-size="16" fill="#6c6680">One host, any model, any server —</text>
      <text x="28" y="116" font-size="16" fill="#6c6680">Ollama + Claude / GPT / Gemini and</text>
      <text x="28" y="142" font-size="16" fill="#6c6680">9 MCP servers, several on live APIs.</text>
    </g>
    <!-- ATTACK -->
    <g transform="translate(381,0)">
      <rect width="357" height="170" rx="16" fill="#ffffff" stroke="#f4b0bc" stroke-opacity="0.9"/>
      <circle cx="32" cy="38" r="8" fill="#e76a82"/>
      <text x="52" y="45" font-size="22" font-weight="800" fill="#e76a82">ATTACK</text>
      <text x="28" y="90"  font-size="16" fill="#6c6680">27 real, runnable exploits against</text>
      <text x="28" y="116" font-size="16" fill="#6c6680">intentionally-vulnerable MCP</text>
      <text x="28" y="142" font-size="16" fill="#6c6680">servers — lab-gated.</text>
    </g>
    <!-- DEFEND -->
    <g transform="translate(762,0)">
      <rect width="357" height="170" rx="16" fill="#ffffff" stroke="#a7dcc6" stroke-opacity="0.9"/>
      <circle cx="32" cy="38" r="8" fill="#3fb38d"/>
      <text x="52" y="45" font-size="22" font-weight="800" fill="#3fb38d">DEFEND</text>
      <text x="28" y="90"  font-size="16" fill="#6c6680">22 reusable guardrails + hardened</text>
      <text x="28" y="116" font-size="16" fill="#6c6680">twins that block every attack, with</text>
      <text x="28" y="142" font-size="16" fill="#6c6680">a live explain-and-verify lab.</text>
    </g>
  </g>

  <!-- stat strip -->
  <g font-size="17" font-weight="600" fill="#867e96" letter-spacing="0.4">
    <text x="82" y="572">27 attacks &#160;·&#160; 22 guardrails &#160;·&#160; 9 MCP servers &#160;·&#160; 5 LLM providers &#160;·&#160; CLI + desktop app</text>
  </g>
</svg>
